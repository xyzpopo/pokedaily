<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬 데일리 도감</title>
<link href="https://fonts.googleapis.com/css2?family=Galmuri11&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d1a;
    --surface: #13132b;
    --card: #1a1a35;
    --accent: #ffcb05;
    --accent2: #3b4cca;
    --red: #ff0000;
    --text: #e8e8f0;
    --muted: #7070a0;
    --border: rgba(255,203,5,0.15);
    --glow: rgba(255,203,5,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 55% 25%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 45% 10%, rgba(255,203,5,0.4) 0%, transparent 100%),
      radial-gradient(2px 2px at 85% 65%, rgba(59,76,202,0.4) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: relative;
    z-index: 10;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
  }

  .logo { display: flex; align-items: center; gap: 0.75rem; }

  .pokeball-icon {
    width: 32px; height: 32px;
    background: linear-gradient(180deg, var(--red) 50%, white 50%);
    border-radius: 50%;
    border: 3px solid #333;
    position: relative;
    flex-shrink: 0;
    animation: spin-slow 8s linear infinite;
  }
  .pokeball-icon::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 9px; height: 9px;
    background: white;
    border-radius: 50%;
    border: 2px solid #333;
    z-index: 1;
  }
  .pokeball-icon::after {
    content: '';
    position: absolute;
    top: calc(50% - 1.5px);
    left: 0; right: 0;
    height: 3px;
    background: #333;
  }
  @keyframes spin-slow { to { transform: rotate(360deg); } }

  .logo h1 {
    font-family: 'Galmuri11', monospace;
    font-size: 1.2rem;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow);
  }

  .date-badge {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 0.3rem 0.8rem;
    border-radius: 20px;
  }

  /* TABS */
  .tabs {
    position: relative;
    z-index: 10;
    display: flex;
    padding: 0 1.5rem;
    border-bottom: 1px solid var(--border);
    background: rgba(13,13,26,0.8);
    backdrop-filter: blur(10px);
    position: sticky;
    top: 0;
  }

  .tab-btn {
    font-family: 'Galmuri11', monospace;
    font-size: 0.82rem;
    color: var(--muted);
    background: transparent;
    border: none;
    padding: 1rem 1.25rem;
    cursor: pointer;
    position: relative;
    transition: color 0.2s;
  }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 10px var(--glow);
  }
  .tab-btn:hover:not(.active) { color: var(--text); }

  /* MAIN */
  main {
    position: relative;
    z-index: 5;
    padding: 1.5rem;
    max-width: 1200px;
    margin: 0 auto;
  }

  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* LOADING */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 55vh;
    gap: 1.25rem;
  }

  .pokeball-loader {
    width: 56px; height: 56px;
    background: linear-gradient(180deg, var(--red) 50%, white 50%);
    border-radius: 50%;
    border: 4px solid var(--accent);
    position: relative;
    animation: pokeball-spin 1s ease-in-out infinite;
    box-shadow: 0 0 30px var(--glow);
  }
  .pokeball-loader::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    border: 3px solid var(--accent);
  }
  .pokeball-loader::after {
    content: '';
    position: absolute;
    top: calc(50% - 2px); left: 0; right: 0;
    height: 4px;
    background: var(--accent);
  }
  @keyframes pokeball-spin {
    0% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(180deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  .loading p {
    font-family: 'Galmuri11', monospace;
    color: var(--muted);
    font-size: 0.85rem;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }
  .section-tag {
    font-family: 'Galmuri11', monospace;
    font-size: 0.68rem;
    color: var(--accent);
    background: rgba(255,203,5,0.1);
    border: 1px solid rgba(255,203,5,0.3);
    padding: 0.18rem 0.65rem;
    border-radius: 20px;
  }
  .section-title { font-size: 1rem; font-weight: 900; color: var(--text); }

  /* POKEMON GRID - 반응형 */
  .pokemon-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
  }

  @media (max-width: 900px) {
    .pokemon-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 540px) {
    .pokemon-grid { grid-template-columns: 1fr; }
  }

  /* POKEMON CARD */
  .pokemon-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.4rem 1.2rem;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    animation: slideUp 0.45s ease both;
  }
  .pokemon-card:nth-child(1) { animation-delay: 0s; }
  .pokemon-card:nth-child(2) { animation-delay: 0.08s; }
  .pokemon-card:nth-child(3) { animation-delay: 0.16s; }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .pokemon-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 24px var(--card-glow, rgba(255,203,5,0.2));
    border-color: var(--card-color, var(--accent));
  }
  .pokemon-card:active { transform: scale(0.98); }

  .card-bg {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background: radial-gradient(circle at 70% 20%, var(--card-color, var(--accent)), transparent 65%);
    pointer-events: none;
  }

  .card-hint {
    position: absolute;
    top: 0.75rem; right: 0.85rem;
    font-size: 0.6rem;
    color: var(--muted);
    opacity: 0.7;
    font-family: 'Galmuri11', monospace;
  }

  .card-number {
    font-family: 'Galmuri11', monospace;
    font-size: 0.68rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 0.6rem;
  }

  .card-image-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 0.85rem;
    position: relative;
  }
  .card-image-wrap::before {
    content: '';
    position: absolute;
    width: 70px; height: 70px;
    background: radial-gradient(circle, var(--card-color, rgba(255,203,5,0.25)), transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    filter: blur(16px);
  }
  .card-image {
    width: 90px; height: 90px;
    image-rendering: pixelated;
    filter: drop-shadow(0 4px 16px var(--card-color, rgba(255,203,5,0.4)));
    transition: transform 0.3s ease;
    position: relative;
    z-index: 1;
  }
  .pokemon-card:hover .card-image { transform: scale(1.08) translateY(-4px); }

  .card-name {
    font-family: 'Galmuri11', monospace;
    font-size: 1.05rem;
    color: var(--text);
    text-align: center;
    margin-bottom: 0.45rem;
  }

  .type-badges {
    display: flex;
    justify-content: center;
    gap: 0.4rem;
    margin-bottom: 0.85rem;
    flex-wrap: wrap;
  }
  .type-badge {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 0.18rem 0.65rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: white;
  }

  .card-desc {
    font-size: 0.73rem;
    color: var(--muted);
    line-height: 1.65;
    text-align: center;
    border-top: 1px solid var(--border);
    padding-top: 0.8rem;
    margin-top: 0.4rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
    margin-top: 0.85rem;
  }
  .stat-row { display: flex; flex-direction: column; gap: 0.15rem; }
  .stat-label {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
  }
  .stat-bar-wrap {
    background: rgba(255,255,255,0.05);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .stat-bar {
    height: 100%;
    border-radius: 4px;
    background: var(--card-color, var(--accent));
    transition: width 1s ease;
  }
  .stat-value {
    font-family: 'Galmuri11', monospace;
    font-size: 0.65rem;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 0.7rem;
  }
  .card-meta span {
    font-size: 0.68rem;
    color: var(--muted);
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(8px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    transform: scale(0.92) translateY(20px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .modal-overlay.open .modal {
    transform: scale(1) translateY(0);
  }

  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    z-index: 10;
  }
  .modal-close:hover { background: rgba(255,255,255,0.12); color: var(--text); }

  .modal-header {
    padding: 2rem 2rem 1.25rem;
    position: relative;
    overflow: hidden;
    border-radius: 24px 24px 0 0;
  }
  .modal-header-bg {
    position: absolute;
    inset: 0;
    opacity: 0.08;
    background: radial-gradient(circle at 80% 20%, var(--modal-color, var(--accent)), transparent 60%);
  }
  .modal-header-inner {
    position: relative;
    z-index: 1;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }
  .modal-image-wrap {
    flex-shrink: 0;
    position: relative;
  }
  .modal-image-wrap::before {
    content: '';
    position: absolute;
    inset: -10px;
    background: radial-gradient(circle, var(--modal-color, rgba(255,203,5,0.3)), transparent 70%);
    filter: blur(20px);
    border-radius: 50%;
  }
  .modal-image {
    width: 130px; height: 130px;
    image-rendering: pixelated;
    position: relative;
    z-index: 1;
    filter: drop-shadow(0 6px 20px var(--modal-color, rgba(255,203,5,0.5)));
  }
  .modal-title-block { flex: 1; min-width: 0; }
  .modal-number {
    font-family: 'Galmuri11', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .modal-name {
    font-family: 'Galmuri11', monospace;
    font-size: 1.8rem;
    color: var(--text);
    line-height: 1.1;
    margin-bottom: 0.3rem;
  }
  .modal-name-en {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    text-transform: capitalize;
  }
  .modal-types { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .modal-body { padding: 0 2rem 2rem; }

  /* MODAL SECTIONS */
  .modal-section { margin-top: 1.5rem; }
  .modal-section-title {
    font-family: 'Galmuri11', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .modal-section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* FLAVOR TEXT */
  .modal-desc {
    font-size: 0.82rem;
    color: var(--text);
    line-height: 1.8;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    padding: 1rem 1.1rem;
    border: 1px solid var(--border);
  }

  /* STATS */
  .modal-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
  .modal-stat-row { display: flex; flex-direction: column; gap: 0.25rem; }
  .modal-stat-top { display: flex; justify-content: space-between; align-items: center; }
  .modal-stat-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .modal-stat-val { font-family: 'Galmuri11', monospace; font-size: 0.75rem; color: var(--text); font-weight: 700; }
  .modal-stat-bar-wrap { background: rgba(255,255,255,0.05); border-radius: 4px; height: 6px; overflow: hidden; }
  .modal-stat-bar {
    height: 100%;
    border-radius: 4px;
    background: var(--modal-color, var(--accent));
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  /* INFO GRID */
  .modal-info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.7rem;
  }
  .modal-info-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    text-align: center;
  }
  .modal-info-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.35rem; }
  .modal-info-val { font-family: 'Galmuri11', monospace; font-size: 0.9rem; color: var(--text); font-weight: 700; }

  /* GENERATION */
  .modal-gen-block {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.1rem;
  }
  .modal-gen-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.4rem 0;
  }
  .modal-gen-row + .modal-gen-row {
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .modal-gen-label { font-size: 0.72rem; color: var(--muted); }
  .modal-gen-val {
    font-family: 'Galmuri11', monospace;
    font-size: 0.8rem;
    color: var(--accent);
  }
  .modal-game-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    margin-top: 0.5rem;
  }
  .modal-game-tag {
    font-size: 0.6rem;
    font-family: 'Galmuri11', monospace;
    padding: 0.18rem 0.55rem;
    border-radius: 20px;
    background: rgba(255,203,5,0.08);
    border: 1px solid rgba(255,203,5,0.2);
    color: var(--accent);
  }

  /* EVOLUTION CHAIN */
  .evo-chain {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    flex-wrap: wrap;
    padding: 0.5rem 0;
  }
  .evo-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.35rem;
    cursor: pointer;
    transition: transform 0.2s;
  }
  .evo-step:hover { transform: scale(1.05); }
  .evo-step.current .evo-img-wrap {
    border-color: var(--accent);
    box-shadow: 0 0 16px var(--glow);
  }
  .evo-img-wrap {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  .evo-img-wrap::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, var(--evo-color, rgba(255,203,5,0.15)), transparent 70%);
  }
  .evo-img {
    width: 52px; height: 52px;
    image-rendering: pixelated;
    position: relative;
    z-index: 1;
  }
  .evo-name {
    font-family: 'Galmuri11', monospace;
    font-size: 0.65rem;
    color: var(--text);
    text-align: center;
    max-width: 72px;
    line-height: 1.3;
  }
  .evo-num {
    font-size: 0.58rem;
    color: var(--muted);
  }
  .evo-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
    color: var(--muted);
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .evo-method {
    font-size: 0.55rem;
    color: var(--muted);
    text-align: center;
    max-width: 60px;
    line-height: 1.4;
  }
  .evo-loading {
    font-family: 'Galmuri11', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    text-align: center;
    padding: 1.5rem;
    animation: blink 1.2s step-end infinite;
  }

  /* ABILITY */
  .ability-list { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .ability-tag {
    font-size: 0.72rem;
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 700;
  }
  .ability-tag.hidden-ability {
    border-color: rgba(255,203,5,0.3);
    background: rgba(255,203,5,0.06);
    color: var(--accent);
  }
  .ability-tag .hidden-label {
    font-size: 0.55rem;
    color: var(--muted);
    margin-left: 0.3rem;
  }

  /* TYPE COLORS */
  .type-normal    { background: #A8A878; }
  .type-fire      { background: #F08030; }
  .type-water     { background: #6890F0; }
  .type-electric  { background: #F8D030; color: #333 !important; }
  .type-grass     { background: #78C850; }
  .type-ice       { background: #98D8D8; color: #333 !important; }
  .type-fighting  { background: #C03028; }
  .type-poison    { background: #A040A0; }
  .type-ground    { background: #E0C068; color: #333 !important; }
  .type-flying    { background: #A890F0; }
  .type-psychic   { background: #F85888; }
  .type-bug       { background: #A8B820; }
  .type-rock      { background: #B8A038; }
  .type-ghost     { background: #705898; }
  .type-dragon    { background: #7038F8; }
  .type-dark      { background: #705848; }
  .type-steel     { background: #B8B8D0; color: #333 !important; }
  .type-fairy     { background: #EE99AC; color: #333 !important; }

  /* ===== QUIZ PAGE ===== */
  .quiz-container { max-width: 650px; margin: 0 auto; }
  .quiz-progress { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .progress-dots { display: flex; gap: 0.45rem; }
  .dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--surface);

<script>
const TYPE_KO = {
  normal:'노말', fire:'불꽃', water:'물', electric:'전기', grass:'풀', ice:'얼음',
  fighting:'격투', poison:'독', ground:'땅', flying:'비행', psychic:'에스퍼', bug:'벌레',
  rock:'바위', ghost:'고스트', dragon:'드래곤', dark:'악', steel:'강철', fairy:'페어리'
};
const STAT_KO = {
  hp:'HP', attack:'공격', defense:'방어',
  'special-attack':'특공', 'special-defense':'특방', speed:'스피드'
};
const TYPE_COLOR = {
  normal:'#A8A878', fire:'#F08030', water:'#6890F0', electric:'#F8D030',
  grass:'#78C850', ice:'#98D8D8', fighting:'#C03028', poison:'#A040A0',
  ground:'#E0C068', flying:'#A890F0', psychic:'#F85888', bug:'#A8B820',
  rock:'#B8A038', ghost:'#705898', dragon:'#7038F8', dark:'#705848',
  steel:'#B8B8D0', fairy:'#EE99AC'
};

// 세대 정보
const GEN_INFO = {
  'generation-i':   { name: '1세대', games: ['레드·그린', '블루', '피카츄'] },
  'generation-ii':  { name: '2세대', games: ['골드·실버', '크리스탈'] },
  'generation-iii': { name: '3세대', games: ['루비·사파이어', '에메랄드', 'FR·LG'] },
  'generation-iv':  { name: '4세대', games: ['다이아몬드·펄', '플라티나', 'HG·SS'] },
  'generation-v':   { name: '5세대', games: ['블랙·화이트', 'B2·W2'] },
  'generation-vi':  { name: '6세대', games: ['X·Y', '오메가루비·알파사파이어'] },
  'generation-vii': { name: '7세대', games: ['썬·문', '울트라썬·울트라문', 'Let\'s Go'] },

  'generation-ix':  { name: '9세대', games: ['스칼렛·바이올렛'] },

// 게임 버전 → 세대 매핑
const VERSION_GEN = {
  'red':'1세대','blue':'1세대','yellow':'1세대',
  'gold':'2세대','silver':'2세대','crystal':'2세대',

  'black':'5세대','white':'5세대','black-2':'5세대','white-2':'5세대',
  'x':'6세대','y':'6세대','omega-ruby':'6세대','alpha-sapphire':'6세대',
  'sun':'7세대','moon':'7세대','ultra-sun':'7세대','ultra-moon':'7세대',
  'lets-go-pikachu':'7세대','lets-go-eevee':'7세대',
  'sword':'8세대','shield':'8세대',
  'brilliant-diamond':'8세대','shining-pearl':'8세대','legends-arceus':'8세대',
  'scarlet':'9세대','violet':'9세대',
};
const VERSION_KO = {
  'red':'레드','blue':'블루','yellow':'피카츄','gold':'골드','silver':'실버','crystal':'크리스탈',
  'ruby':'루비','sapphire':'사파이어','emerald':'에메랄드','firered':'파이어레드','leafgreen':'리프그린',
  'diamond':'다이아몬드','pearl':'펄','platinum':'플라티나','heartgold':'하트골드','soulsilver':'소울실버',
  'black':'블랙','white':'화이트','black-2':'블랙2','white-2':'화이트2',
  'x':'X','y':'Y','omega-ruby':'오메가루비','alpha-sapphire':'알파사파이어',
  'sun':'썬','moon':'문','ultra-sun':'울트라썬','ultra-moon':'울트라문',
  'lets-go-pikachu':'렛츠고 피카츄','lets-go-eevee':'렛츠고 이브이',
  'sword':'소드','shield':'실드','brilliant-diamond':'브릴다이아','shining-pearl':'샤이닝펄',
  'legends-arceus':'레전드 아르세우스','scarlet':'스칼렛','violet':'바이올렛',
};

// 진화 방법 한국어
function evoMethodKo(detail) {
  if (!detail) return '';
  if (detail.min_level) return `Lv.${detail.min_level}`;
  if (detail.item) return `아이템: ${detail.item.name}`;
  if (detail.min_happiness) return `친밀도 ↑`;
  if (detail.min_beauty) return `아름다움 ↑`;
  if (detail.min_affection) return `친애도 ↑`;
  if (detail.held_item) return `소지: ${detail.held_item.name}`;
  if (detail.known_move) return `기술: ${detail.known_move.name}`;
  if (detail.known_move_type) return `타입기술 습득`;
  if (detail.location) return `특정 장소`;
  if (detail.needs_overworld_rain) return `비 속에서`;
  if (detail.time_of_day === 'day') return `낮`;
  if (detail.time_of_day === 'night') return `밤`;
  if (detail.trade_species) return `통신 교환`;
  if (detail.trigger?.name === 'trade') return `통신 교환`;
  if (detail.trigger?.name === 'use-item') return `아이템 사용`;
  if (detail.trigger?.name === 'shed') return `레벨업`;
  return '레벨업';
}

// Seeded RNG
function seededRand(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}

const MAX_POKEMON_ID = 1025;

function pickDailyIds() {
  const rand = seededRand(getDailySeed());
  const ids = new Set();
  while (ids.size < 3) ids.add(Math.floor(rand() * MAX_POKEMON_ID) + 1);
  // 번호 순 정렬
  return [...ids].sort((a,b)=>a-b);
}

// Fetch pokemon data
async function fetchPokemon(id, _depth = 0) {
  if (_depth > 5) return null;
  let poke, spec;
  try {
    [poke, spec] = await Promise.all([
      fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>{ if(!r.ok) throw new Error(); return r.json(); }),
      fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`).then(r=>{ if(!r.ok) throw new Error(); return r.json(); })
    ]);
  } catch(e) {
    const fallback = Math.floor(Math.random() * 898) + 1;
    return fetchPokemon(fallback, _depth + 1);
  }

  const nameKo = spec.names.find(n=>n.language.name==='ko')?.name
               || spec.names.find(n=>n.language.name==='ja-Hrkt')?.name
               || poke.name;

  const desc = spec.flavor_text_entries.find(e=>e.language.name==='ko')?.flavor_text
             || spec.flavor_text_entries.find(e=>e.language.name==='en')?.flavor_text
             || '';

  // 특성 한국어 이름 fetch
  const abilities = await Promise.all(poke.abilities.map(async a => {
    let nameKo = a.ability.name;
    try {
      const abilData = await fetch(a.ability.url).then(r=>r.json());
      nameKo = abilData.names.find(n=>n.language.name==='ko')?.name
             || abilData.names.find(n=>n.language.name==='ja')?.name
             || a.ability.name;
    } catch(e) {}
    return { name: nameKo, isHidden: a.is_hidden };
  }));

  // 등장 게임 목록
  const gameVersions = spec.flavor_text_entries
    .map(e=>e.version?.name)
    .filter(Boolean);
  const uniqueVersions = [...new Set(gameVersions)];

  return {
    id, name: nameKo,
    nameEn: poke.name,
    image: poke.sprites.other['official-artwork']?.front_default || poke.sprites.front_default,
    imagePixel: poke.sprites.front_default,
    types: poke.types.map(t=>t.type.name),
    stats: poke.stats.slice(0,6).map(s=>({ name:s.stat.name, value:s.base_stat })),
    desc: desc.replace(/\f/g,' ').replace(/\n/g,' '),
    category: spec.genera.find(g=>g.language.name==='ko')?.genus || '',
    height: poke.height / 10,
    weight: poke.weight / 10,
    genus: spec.genera.find(g=>g.language.name==='ko')?.genus || '',
    generation: spec.generation?.name || '',
    evoChainUrl: spec.evolution_chain?.url || '',
    abilities,
    gameVersions: uniqueVersions,
    captureRate: spec.capture_rate,
    baseHappiness: spec.base_happiness,
    speciesId: spec.id,
  };
}

// Fetch evolution chain
async function fetchEvoChain(url) {
  try {
    const data = await fetch(url).then(r=>r.json());
    return data.chain;
  } catch(e) { return null; }
}

// Parse evolution chain into flat list of steps
async function parseEvoChain(chain) {
  const steps = [];

  async function walk(node, prevName) {
    const speciesId = parseInt(node.species.url.split('/').filter(Boolean).pop());
    let img = null;
    let nameKo = node.species.name;
    try {
      const [pk, sp] = await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${speciesId}`).then(r=>r.json()),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${speciesId}`).then(r=>r.json()),
      ]);
      img = pk.sprites.other['official-artwork']?.front_default || pk.sprites.front_default;
      nameKo = sp.names.find(n=>n.language.name==='ko')?.name || node.species.name;
    } catch(e) {}

    const methods = node.evolution_details?.map(d => evoMethodKo(d)).filter(Boolean) || [];
    steps.push({ id: speciesId, name: nameKo, img, methods });

    for (const evo of (node.evolves_to || [])) {
      await walk(evo, nameKo);
    }
  }

  await walk(chain);
  return steps;
}

// STATE
let pokemonData = [];
let dexViewed = false;
let quizQuestions = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = [];

// Date
const d = new Date();
document.getElementById('dateDisplay').textContent =
  `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;

// INIT
async function init() {
  const ids = pickDailyIds();
  const results = await Promise.all(ids.map(fetchPokemon));
  pokemonData = results.filter(Boolean);
  renderDex();
}

function renderDex() {
  document.getElementById('dex-loading').style.display = 'none';
  document.getElementById('dex-content').style.display = 'block';
  const grid = document.getElementById('pokemonGrid');
  grid.innerHTML = '';

  pokemonData.forEach((p, i) => {
    const mainType = p.types[0];

    card.className = 'pokemon-card';
    card.style.setProperty('--card-color', color);
    card.style.setProperty('--card-glow', color+'44');
    card.onclick = () => openModal(p);
    card.innerHTML = `
      <div class="card-bg"></div>
      <span class="card-hint">탭하면 자세히 ▶</span>
      <div class="card-number">No.${String(p.id).padStart(4,'0')} · ${p.genus}</div>
      <div class="card-image-wrap">
        <img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy"/>
      </div>
      <div class="card-name">${p.name}</div>
      <div class="type-badges">
        ${p.types.map(t=>`<span class="type-badge type-${t}">${TYPE_KO[t]||t}</span>`).join('')}
      </div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-stats">
        ${p.stats.map(s=>`
          <div class="stat-row">
            <span class="stat-label">${STAT_KO[s.name]||s.name}</span>
            <div class="stat-bar-wrap"><div class="stat-bar" style="width:0%" data-val="${Math.min(s.value,255)/255*100}"></div></div>
            <span class="stat-value">${s.value}</span>
          </div>`).join('')}
      </div>
      <div class="card-meta">
        <span>키 ${p.height}m</span>
        <span>무게 ${p.weight}kg</span>
      </div>
    `;
    grid.appendChild(card);
    setTimeout(()=>{
      card.querySelectorAll('.stat-bar').forEach(bar=>{
        bar.style.width = bar.dataset.val + '%';
      });
    }, 500 + i * 120);
  });
  dexViewed = true;
}

// ===== MODAL =====
async function openModal(p) {
  const color = TYPE_COLOR[p.types[0]] || '#ffcb05';
  const overlay = document.getElementById('modalOverlay');
  const modal = document.getElementById('modal');
  modal.style.setProperty('--modal-color', color);

  // 등장 세대 계산
  const genInfo = GEN_INFO[p.generation] || { name: '알 수 없음', games: [] };

  // 등장 게임 버전 → 세대 그룹화
  const genMap = {};
  p.gameVersions.forEach(v => {
    const g = VERSION_GEN[v];
    if (g) {
      if (!genMap[g]) genMap[g] = [];
      if (VERSION_KO[v]) genMap[g].push(VERSION_KO[v]);
    }
  });

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div class="modal-header-bg"></div>
      <div class="modal-header-inner">
        <div class="modal-image-wrap">
          <img class="modal-image" src="${p.image}" alt="${p.name}"/>
        </div>
        <div class="modal-title-block">
          <div class="modal-number">No.${String(p.id).padStart(4,'0')} · ${p.genus}</div>
          <div class="modal-name">${p.name}</div>
          <div class="modal-name-en">${p.nameEn}</div>
          <div class="modal-types">
            ${p.types.map(t=>`<span class="type-badge type-${t}">${TYPE_KO[t]||t}</span>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div class="modal-body">

      <div class="modal-section">
        <div class="modal-section-title">📖 도감 설명</div>
        <div class="modal-desc">${p.desc}</div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">📊 기본 스탯</div>
        <div class="modal-stats">
          ${p.stats.map(s=>`
            <div class="modal-stat-row">
              <div class="modal-stat-top">
                <span class="modal-stat-label">${STAT_KO[s.name]||s.name}</span>
                <span class="modal-stat-val">${s.value}</span>
              </div>
              <div class="modal-stat-bar-wrap">
                <div class="modal-stat-bar" style="width:0%" data-val="${Math.min(s.value,255)/255*100}"></div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">📏 기본 정보</div>
        <div class="modal-info-grid">
          <div class="modal-info-item">
            <div class="modal-info-label">키</div>
            <div class="modal-info-val">${p.height}m</div>
          </div>
          <div class="modal-info-item">
            <div class="modal-info-label">무게</div>
            <div class="modal-info-val">${p.weight}kg</div>
          </div>
          <div class="modal-info-item">
            <div class="modal-info-label">포획률</div>
            <div class="modal-info-val">${p.captureRate ?? '-'}</div>
          </div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">✨ 특성</div>
        <div class="ability-list">
          ${p.abilities.map(a=>`
            <span class="ability-tag ${a.isHidden?'hidden-ability':''}">
              ${a.name}${a.isHidden?'<span class="hidden-label">숨겨진특성</span>':''}
            </span>`).join('')}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">🌍 등장 세대</div>
        <div class="modal-gen-block">
          <div class="modal-gen-row">
            <span class="modal-gen-label">첫 등장</span>
            <span class="modal-gen-val">${genInfo.name}</span>
          </div>
          <div class="modal-gen-row">
            <span class="modal-gen-label">대표 타이틀</span>
            <span class="modal-gen-val" style="font-size:0.72rem">${genInfo.games.join(' · ') || '-'}</span>
          </div>
          ${Object.keys(genMap).length > 1 ? `
          <div class="modal-gen-row" style="align-items:flex-start">
            <span class="modal-gen-label" style="padding-top:0.15rem">이후 등장</span>
            <div class="modal-game-tags" style="justify-content:flex-end">
              ${Object.keys(genMap).filter(g=>g!==genInfo.name).sort().map(g=>`<span class="modal-game-tag">${g}</span>`).join('')}
            </div>
          </div>` : ''}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">🔄 진화 과정</div>
        <div id="evoChainArea">
          <div class="evo-loading">진화 정보 불러오는 중...</div>

  }, 100);

  // 진화 체인 비동기 로드
  if (p.evoChainUrl) {
    const chain = await fetchEvoChain(p.evoChainUrl);
    if (chain) {
      const steps = await parseEvoChain(chain);
      renderEvoChain(steps, p.id);
    } else {
      document.getElementById('evoChainArea').innerHTML = '<div style="color:var(--muted);font-size:0.75rem;text-align:center;padding:1rem">진화 없음 (단일 진화)</div>';
    }
  } else {
    document.getElementById('evoChainArea').innerHTML = '<div style="color:var(--muted);font-size:0.75rem;text-align:center;padding:1rem">진화 정보 없음</div>';
  }
}

function renderEvoChain(steps, currentId) {
  const area = document.getElementById('evoChainArea');
  if (!area) return;
  if (steps.length <= 1) {
    area.innerHTML = '<div style="color:var(--muted);font-size:0.75rem;text-align:center;padding:1rem">진화 없음 (단일 진화)</div>';
    return;
  }

  let html = '<div class="evo-chain">';
  steps.forEach((step, i) => {
    const isCurrent = step.id === currentId;
    const typeColor = '#ffcb05';
    if (i > 0) {
      const method = step.methods?.[0] || '';
      html += `<div class="evo-arrow"><span>→</span><span class="evo-method">${method}</span></div>`;
    }
    html += `
      <div class="evo-step ${isCurrent?'current':''}" style="--evo-color:${typeColor}">
        <div class="evo-img-wrap">
          ${step.img ? `<img class="evo-img" src="${step.img}" alt="${step.name}" loading="lazy"/>` : '<div style="width:42px;height:42px;"></div>'}
        </div>
        <div class="evo-name">${step.name}</div>
        <div class="evo-num">No.${String(step.id).padStart(4,'0')}</div>
      </div>`;
  });
  html += '</div>';
  area.innerHTML = html;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

// ESC to close
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ===== QUIZ =====
function buildQuiz() {
  quizQuestions = [];
  quizIdx = 0;
  quizScore = 0;
  quizAnswered = [];

  const allNames = pokemonData.map(p=>p.name);

  pokemonData.forEach((p, i) => {
    const extra = ['이상해씨','리자몽','거북왕','피카츄','파이리','꼬부기','잠만보','뮤츠','마자용','한카리아스']
      .filter(n=>!allNames.includes(n));
    const pool = shuffle([...pokemonData.filter((_,j)=>j!==i).map(o=>o.name), ...extra]);
    const nameOptions = shuffle([p.name, pool[0], pool[1], pool[2]]);

    quizQuestions.push({
      type: 'silhouette',
      pokemon: p,
      question: `이 포켓몬의 이름은?`,
      hint: p.desc.slice(0,60)+'…',
      answer: p.name,
      options: nameOptions
    });

    const allTypes = Object.keys(TYPE_KO);
    const wrongTypes = shuffle(allTypes.filter(t=>!p.types.includes(t))).slice(0,3);
    const typeOptions = shuffle([TYPE_KO[p.types[0]], ...wrongTypes.map(t=>TYPE_KO[t])]);
    quizQuestions.push({
      type: 'type',
      pokemon: p,
      question: `${p.name}의 주요 타입은?`,
      hint: `힌트: ${p.category} 포켓몬이에요.`,
      answer: TYPE_KO[p.types[0]],
      options: typeOptions
    });
  });

  quizQuestions = shuffle(quizQuestions).slice(0, 6);
  renderQuiz();
}

function renderQuiz() {
  document.getElementById('quiz-wait').style.display = 'none';
  document.getElementById('quiz-content').style.display = 'block';
  renderProgressDots();
  renderQuestion();
}

function renderProgressDots() {
  const wrap = document.getElementById('progressDots');
  wrap.innerHTML = quizQuestions.map((_, i) => {
    let cls = 'dot';
    if (i < quizIdx) cls += quizAnswered[i] ? ' done' : ' wrong';
    else if (i === quizIdx) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('scoreDisplay').textContent = `${quizScore} / ${quizIdx}`;
}

function renderQuestion() {
  const area = document.getElementById('quizArea');
  if (quizIdx >= quizQuestions.length) { renderResult(); return; }
  const q = quizQuestions[quizIdx];
  const isHidden = q.type === 'silhouette';

  area.innerHTML = `
    <div class="quiz-card">
      <div class="quiz-question-num">Q${quizIdx+1} / ${quizQuestions.length}</div>
      <div class="quiz-image-wrap">
        <img id="quizImg" class="quiz-pokemon-img${isHidden?' hidden':''}" src="${q.pokemon.image}" alt="?"/>
      </div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-hint">${q.hint}</div>
      <div class="options-grid">
        ${q.options.map(opt=>`
          <button class="option-btn" onclick="answerQuiz('${opt.replace(/'/g,"\\'")}', this)">${opt}</button>
        `).join('')}
      </div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${quizIdx < quizQuestions.length-1 ? '다음 문제 →' : '결과 보기 →'}
      </button>
    </div>
  `;
  renderProgressDots();
}

function answerQuiz(chosen, btn) {
  const q = quizQuestions[quizIdx];
  const allBtns = document.querySelectorAll('.option-btn');
  allBtns.forEach(b=>b.disabled=true);

  const correct = chosen === q.answer;
  const feedback = document.getElementById('quizFeedback');
  const nextBtn = document.getElementById('nextBtn');
  const img = document.getElementById('quizImg');
  if (img) img.classList.remove('hidden');

  if (correct) {
    btn.classList.add('correct');
    quizScore++;
    feedback.className = 'quiz-feedback show correct-fb';
    feedback.textContent = `✅ 정답! ${q.pokemon.name}이(가) 맞아요.`;
    quizAnswered.push(true);
  } else {
    btn.classList.add('wrong');
    allBtns.forEach(b=>{ if(b.textContent.trim()===q.answer) b.classList.add('correct'); });
    feedback.className = 'quiz-feedback show wrong-fb';
    feedback.textContent = `❌ 오답! 정답은 "${q.answer}"이에요.`;
    quizAnswered.push(false);
  }
  nextBtn.classList.add('show');
  renderProgressDots();
}

function nextQuestion() { quizIdx++; renderQuestion(); }

function renderResult() {
  const area = document.getElementById('quizArea');
  const pct = Math.round(quizScore/quizQuestions.length*100);
  const emoji = pct===100?'🏆':pct>=70?'⭐':pct>=40?'💪':'😅';
  const msg = pct===100?'완벽해요! 포켓몬 마스터네요!':pct>=70?'훌륭해요! 오늘도 열공!':pct>=40?'나쁘지 않아요. 다시 도전!':'오늘의 포켓몬을 다시 공부해봐요!';

  area.innerHTML = `
    <div class="result-card">
      <span class="result-emoji">${emoji}</span>
      <div class="result-score">${quizScore}/${quizQuestions.length}</div>
      <div class="result-msg">${msg}</div>
      <div class="result-breakdown">
        ${quizQuestions.map((q,i)=>`
          <div class="breakdown-row">
            <span class="breakdown-name">${q.pokemon.name} (${q.type==='silhouette'?'이름':'타입'})</span>
            <span class="breakdown-result ${quizAnswered[i]?'ok':'bad'}">${quizAnswered[i]?'정답✓':'오답✗'}</span>
          </div>`).join('')}
      </div>
      <button class="restart-btn" onclick="restartQuiz()">🔄 다시 풀기</button>
    </div>
  `;
  renderProgressDots();
}

function restartQuiz() { buildQuiz(); }

function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// TABS
function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active', (i===0&&tab==='dex')||(i===1&&tab==='quiz'));
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));

  if (tab==='dex') {
    document.getElementById('dex-page').classList.add('active');
  } else {
    document.getElementById('quiz-page').classList.add('active');
    if (!dexViewed) {
      document.getElementById('quiz-wait').style.display = 'flex';
      document.getElementById('quiz-content').style.display = 'none';
    } else if (quizQuestions.length===0) {
      document.getElementById('quiz-wait').style.display = 'none';
      document.getElementById('quiz-loading').style.display = 'flex';
      setTimeout(()=>{
        document.getElementById('quiz-loading').style.display = 'none';
        buildQuiz();
      }, 600);
    }
  }
}

init();
</script>
