<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포켓몬 데일리 도감</title>
<link href="https://fonts.googleapis.com/css2?family=Galmuri11&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0d1a; --surface:#13132b; --card:#1a1a35;
  --accent:#ffcb05; --red:#ff0000;
  --text:#e8e8f0; --muted:#7070a0; --border:rgba(255,203,5,0.15); --glow:rgba(255,203,5,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:
  radial-gradient(1px 1px at 10% 15%,rgba(255,255,255,.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 30% 60%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 55% 25%,rgba(255,255,255,.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 75% 80%,rgba(255,255,255,.3) 0%,transparent 100%),
  radial-gradient(2px 2px at 45% 10%,rgba(255,203,5,.4) 0%,transparent 100%),
  radial-gradient(2px 2px at 85% 65%,rgba(59,76,202,.4) 0%,transparent 100%);
  pointer-events:none;z-index:0;}

/* HEADER */
header{position:relative;z-index:10;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(10px);}
.logo{display:flex;align-items:center;gap:.75rem;}
.pokeball-icon{width:30px;height:30px;background:linear-gradient(180deg,var(--red) 50%,white 50%);border-radius:50%;border:3px solid #333;position:relative;flex-shrink:0;animation:spin-slow 8s linear infinite;}
.pokeball-icon::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;background:white;border-radius:50%;border:2px solid #333;z-index:1;}
.pokeball-icon::after{content:'';position:absolute;top:calc(50% - 1.5px);left:0;right:0;height:3px;background:#333;}
@keyframes spin-slow{to{transform:rotate(360deg);}}
.logo h1{font-family:'Galmuri11',monospace;font-size:1.1rem;color:var(--accent);text-shadow:0 0 20px var(--glow);}
.date-badge{font-size:.72rem;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.28rem .75rem;border-radius:20px;}

/* TABS */
.tabs{position:sticky;top:0;z-index:20;display:flex;padding:0 1rem;border-bottom:1px solid var(--border);background:rgba(13,13,26,.92);backdrop-filter:blur(12px);}
.tab-btn{font-family:'Galmuri11',monospace;font-size:.78rem;color:var(--muted);background:transparent;border:none;padding:.9rem 1rem;cursor:pointer;position:relative;transition:color .2s;white-space:nowrap;}
.tab-btn.active{color:var(--accent);}
.tab-btn.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);box-shadow:0 0 10px var(--glow);}
.tab-btn:hover:not(.active){color:var(--text);}

/* MAIN */
main{position:relative;z-index:5;padding:1.25rem 1rem;max-width:1200px;margin:0 auto;}
.page{display:none;}
.page.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;gap:1.25rem;}
.pokeball-loader{width:52px;height:52px;background:linear-gradient(180deg,var(--red) 50%,white 50%);border-radius:50%;border:4px solid var(--accent);position:relative;animation:pokeball-spin 1s ease-in-out infinite;box-shadow:0 0 30px var(--glow);}
.pokeball-loader::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:13px;height:13px;background:white;border-radius:50%;border:3px solid var(--accent);}
.pokeball-loader::after{content:'';position:absolute;top:calc(50% - 2px);left:0;right:0;height:4px;background:var(--accent);}
@keyframes pokeball-spin{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.1);}100%{transform:rotate(360deg) scale(1);}}
.loading p{font-family:'Galmuri11',monospace;color:var(--muted);font-size:.82rem;animation:blink 1.2s step-end infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;gap:.75rem;margin-bottom:1.1rem;}
.section-tag{font-family:'Galmuri11',monospace;font-size:.65rem;color:var(--accent);background:rgba(255,203,5,.1);border:1px solid rgba(255,203,5,.3);padding:.15rem .6rem;border-radius:20px;}
.section-title{font-size:.95rem;font-weight:900;color:var(--text);}

/* DAILY GRID */
.pokemon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;}
@media(max-width:800px){.pokemon-grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.pokemon-grid{grid-template-columns:1fr;}}

/* POKEMON CARD (daily) */
.pokemon-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:1.3rem 1.1rem;position:relative;overflow:hidden;cursor:pointer;transition:transform .25s,box-shadow .25s,border-color .25s;animation:slideUp .45s ease both;}
.pokemon-card:nth-child(1){animation-delay:0s;}.pokemon-card:nth-child(2){animation-delay:.08s;}.pokemon-card:nth-child(3){animation-delay:.16s;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.pokemon-card:hover{transform:translateY(-5px);box-shadow:0 16px 50px rgba(0,0,0,.5),0 0 24px var(--card-glow,rgba(255,203,5,.2));border-color:var(--card-color,var(--accent));}
.card-bg{position:absolute;inset:0;opacity:.06;background:radial-gradient(circle at 70% 20%,var(--card-color,var(--accent)),transparent 65%);pointer-events:none;}
.card-hint{position:absolute;top:.7rem;right:.8rem;font-size:.58rem;color:var(--muted);opacity:.7;font-family:'Galmuri11',monospace;}
.card-number{font-family:'Galmuri11',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.55rem;}
.card-image-wrap{display:flex;justify-content:center;margin-bottom:.75rem;position:relative;}
.card-image-wrap::before{content:'';position:absolute;width:65px;height:65px;background:radial-gradient(circle,var(--card-color,rgba(255,203,5,.25)),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;filter:blur(14px);}
.card-image{width:85px;height:85px;image-rendering:pixelated;filter:drop-shadow(0 4px 14px var(--card-color,rgba(255,203,5,.4)));transition:transform .3s;position:relative;z-index:1;}
.pokemon-card:hover .card-image{transform:scale(1.08) translateY(-4px);}
.card-name{font-family:'Galmuri11',monospace;font-size:1rem;color:var(--text);text-align:center;margin-bottom:.4rem;}
.type-badges{display:flex;justify-content:center;gap:.35rem;margin-bottom:.8rem;flex-wrap:wrap;}
.type-badge{font-size:.62rem;font-weight:700;padding:.15rem .6rem;border-radius:20px;text-transform:uppercase;letter-spacing:.06em;color:white;}
.card-desc{font-size:.7rem;color:var(--muted);line-height:1.65;text-align:center;border-top:1px solid var(--border);padding-top:.75rem;margin-top:.35rem;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:.35rem;margin-top:.8rem;}
.stat-row{display:flex;flex-direction:column;gap:.12rem;}
.stat-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.stat-bar-wrap{background:rgba(255,255,255,.05);border-radius:4px;height:4px;overflow:hidden;}
.stat-bar{height:100%;border-radius:4px;background:var(--card-color,var(--accent));transition:width 1s ease;}
.stat-value{font-family:'Galmuri11',monospace;font-size:.62rem;color:var(--text);}
.card-meta{display:flex;justify-content:center;gap:1rem;margin-top:.65rem;}
.card-meta span{font-size:.65rem;color:var(--muted);}

/* ====== NATIONAL DEX ====== */
.ndex-controls{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-wrap input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.55rem .85rem .55rem 2.2rem;font-size:.82rem;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.search-wrap input::placeholder{color:var(--muted);}
.search-wrap input:focus{border-color:rgba(255,203,5,.5);}
.search-wrap .search-icon{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem;pointer-events:none;}
.type-filter{display:flex;gap:.35rem;flex-wrap:wrap;}
.type-filter-btn{font-size:.6rem;font-weight:700;padding:.2rem .6rem;border-radius:20px;border:none;cursor:pointer;opacity:.55;transition:opacity .2s,transform .15s;color:white;}
.type-filter-btn.active{opacity:1;transform:scale(1.08);}
.ndex-count{font-family:'Galmuri11',monospace;font-size:.7rem;color:var(--muted);padding:.3rem .6rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;white-space:nowrap;}
.ndex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:.55rem;}
@media(max-width:400px){.ndex-grid{grid-template-columns:repeat(auto-fill,minmax(68px,1fr));}}
.ndex-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.5rem .35rem .45rem;display:flex;flex-direction:column;align-items:center;gap:.25rem;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden;}
.ndex-card::before{content:'';position:absolute;inset:0;opacity:.07;background:radial-gradient(circle at 50% 30%,var(--nc,#ffcb05),transparent 70%);pointer-events:none;}
.ndex-card:hover{transform:translateY(-3px);border-color:var(--nc,var(--accent));box-shadow:0 6px 20px rgba(0,0,0,.4);}
.ndex-img{width:56px;height:56px;image-rendering:pixelated;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4));}
.ndex-num{font-family:'Galmuri11',monospace;font-size:.58rem;color:var(--muted);}
.ndex-name{font-size:.6rem;color:var(--text);font-weight:700;text-align:center;line-height:1.3;word-break:keep-all;}
.ndex-type-dots{display:flex;gap:.2rem;}
.ndex-type-dot{width:6px;height:6px;border-radius:50%;}
.ndex-load-more{margin-top:1rem;display:flex;justify-content:center;}
.load-more-btn{font-family:'Galmuri11',monospace;font-size:.78rem;color:var(--bg);background:var(--accent);border:none;padding:.6rem 1.6rem;border-radius:30px;cursor:pointer;transition:transform .2s;box-shadow:0 4px 16px var(--glow);}
.load-more-btn:hover{transform:scale(1.04);}
.ndex-spinner{text-align:center;padding:2rem;font-family:'Galmuri11',monospace;font-size:.78rem;color:var(--muted);animation:blink 1.2s step-end infinite;}

/* FORM BADGE */
.form-badge{display:inline-block;font-size:.55rem;padding:.1rem .45rem;border-radius:10px;background:rgba(255,203,5,.12);border:1px solid rgba(255,203,5,.3);color:var(--accent);font-family:'Galmuri11',monospace;margin-left:.3rem;vertical-align:middle;}

/* ====== MODAL ====== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:24px;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;position:relative;transform:scale(.92) translateY(20px);transition:transform .3s cubic-bezier(.34,1.56,.64,1);scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.modal-overlay.open .modal{transform:scale(1) translateY(0);}
.modal-close{position:absolute;top:.9rem;right:.9rem;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.modal-close:hover{background:rgba(255,255,255,.12);color:var(--text);}
.modal-header{padding:1.75rem 1.75rem 1.1rem;position:relative;overflow:hidden;border-radius:24px 24px 0 0;}
.modal-header-bg{position:absolute;inset:0;opacity:.08;background:radial-gradient(circle at 80% 20%,var(--modal-color,var(--accent)),transparent 60%);}
.modal-header-inner{position:relative;z-index:1;display:flex;gap:1.25rem;align-items:center;}
.modal-image-wrap{flex-shrink:0;position:relative;}
.modal-image-wrap::before{content:'';position:absolute;inset:-10px;background:radial-gradient(circle,var(--modal-color,rgba(255,203,5,.3)),transparent 70%);filter:blur(20px);border-radius:50%;}
.modal-image{width:120px;height:120px;image-rendering:pixelated;position:relative;z-index:1;filter:drop-shadow(0 6px 18px var(--modal-color,rgba(255,203,5,.5)));}
.modal-title-block{flex:1;min-width:0;}
.modal-number{font-family:'Galmuri11',monospace;font-size:.68rem;color:var(--muted);margin-bottom:.35rem;}
.modal-name{font-family:'Galmuri11',monospace;font-size:1.65rem;color:var(--text);line-height:1.1;margin-bottom:.25rem;}
.modal-name-en{font-size:.75rem;color:var(--muted);margin-bottom:.65rem;text-transform:capitalize;}
.modal-types{display:flex;gap:.35rem;flex-wrap:wrap;}
.modal-body{padding:0 1.75rem 1.75rem;}
.modal-section{margin-top:1.35rem;}
.modal-section-title{font-family:'Galmuri11',monospace;font-size:.7rem;color:var(--accent);letter-spacing:.1em;margin-bottom:.8rem;display:flex;align-items:center;gap:.5rem;}
.modal-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.modal-desc{font-size:.8rem;color:var(--text);line-height:1.85;background:rgba(255,255,255,.03);border-radius:12px;padding:.9rem 1rem;border:1px solid var(--border);}
.modal-stats{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;}
.modal-stat-row{display:flex;flex-direction:column;gap:.22rem;}
.modal-stat-top{display:flex;justify-content:space-between;align-items:center;}
.modal-stat-label{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.modal-stat-val{font-family:'Galmuri11',monospace;font-size:.72rem;color:var(--text);font-weight:700;}
.modal-stat-bar-wrap{background:rgba(255,255,255,.05);border-radius:4px;height:5px;overflow:hidden;}
.modal-stat-bar{height:100%;border-radius:4px;background:var(--modal-color,var(--accent));transition:width 1.2s cubic-bezier(.4,0,.2,1);}
.modal-info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;}
.modal-info-item{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:.7rem .8rem;text-align:center;}
.modal-info-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:.3rem;}
.modal-info-val{font-family:'Galmuri11',monospace;font-size:.88rem;color:var(--text);font-weight:700;}
.modal-gen-block{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:.9rem 1rem;}
.modal-gen-row{display:flex;justify-content:space-between;align-items:center;padding:.35rem 0;}
.modal-gen-row+.modal-gen-row{border-top:1px solid rgba(255,255,255,.04);}
.modal-gen-label{font-size:.7rem;color:var(--muted);}
.modal-gen-val{font-family:'Galmuri11',monospace;font-size:.78rem;color:var(--accent);}
.modal-game-tags{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:flex-end;}
.modal-game-tag{font-size:.58rem;font-family:'Galmuri11',monospace;padding:.15rem .5rem;border-radius:20px;background:rgba(255,203,5,.08);border:1px solid rgba(255,203,5,.2);color:var(--accent);}

/* FORMS TAB in modal */
.forms-grid{display:flex;gap:.6rem;flex-wrap:wrap;}
.form-card{display:flex;flex-direction:column;align-items:center;gap:.3rem;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:12px;padding:.65rem .7rem;cursor:pointer;transition:border-color .2s,transform .2s;min-width:72px;}
.form-card:hover{border-color:var(--accent);transform:scale(1.04);}
.form-card.active-form{border-color:var(--accent);background:rgba(255,203,5,.06);}
.form-card img{width:60px;height:60px;image-rendering:pixelated;}
.form-card-name{font-size:.6rem;color:var(--text);text-align:center;line-height:1.3;}

/* ABILITY */
.ability-list{display:flex;flex-wrap:wrap;gap:.45rem;}
.ability-tag{font-size:.7rem;padding:.28rem .72rem;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--text);font-weight:700;}
.ability-tag.hidden-ability{border-color:rgba(255,203,5,.3);background:rgba(255,203,5,.06);color:var(--accent);}
.ability-tag .hidden-label{font-size:.53rem;color:var(--muted);margin-left:.3rem;}

/* EVOLUTION */
.evo-chain{display:flex;align-items:center;justify-content:center;gap:.4rem;flex-wrap:wrap;padding:.4rem 0;}
.evo-step{display:flex;flex-direction:column;align-items:center;gap:.3rem;cursor:pointer;transition:transform .2s;}
.evo-step:hover{transform:scale(1.05);}
.evo-step.current .evo-img-wrap{border-color:var(--accent);box-shadow:0 0 14px var(--glow);}
.evo-img-wrap{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.04);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:border-color .2s,box-shadow .2s;position:relative;overflow:hidden;}
.evo-img-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(circle,rgba(255,203,5,.12),transparent 70%);}
.evo-img{width:50px;height:50px;image-rendering:pixelated;position:relative;z-index:1;}
.evo-name{font-family:'Galmuri11',monospace;font-size:.62rem;color:var(--text);text-align:center;max-width:68px;line-height:1.3;}
.evo-num{font-size:.55rem;color:var(--muted);}
.evo-arrow{display:flex;flex-direction:column;align-items:center;gap:.15rem;color:var(--muted);font-size:1rem;flex-shrink:0;}
.evo-method{font-size:.52rem;color:var(--muted);text-align:center;max-width:56px;line-height:1.4;}
.evo-loading{font-family:'Galmuri11',monospace;font-size:.72rem;color:var(--muted);text-align:center;padding:1.25rem;animation:blink 1.2s step-end infinite;}

/* TYPE COLORS */
.type-normal{background:#A8A878;}.type-fire{background:#F08030;}.type-water{background:#6890F0;}
.type-electric{background:#F8D030;color:#333!important;}.type-grass{background:#78C850;}
.type-ice{background:#98D8D8;color:#333!important;}.type-fighting{background:#C03028;}
.type-poison{background:#A040A0;}.type-ground{background:#E0C068;color:#333!important;}
.type-flying{background:#A890F0;}.type-psychic{background:#F85888;}.type-bug{background:#A8B820;}
.type-rock{background:#B8A038;}.type-ghost{background:#705898;}.type-dragon{background:#7038F8;}
.type-dark{background:#705848;}.type-steel{background:#B8B8D0;color:#333!important;}
.type-fairy{background:#EE99AC;color:#333!important;}

/* ====== QUIZ ====== */
.quiz-container{max-width:620px;margin:0 auto;}
.quiz-progress{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem;}
.progress-dots{display:flex;gap:.4rem;flex-wrap:wrap;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--surface);border:1px solid var(--border);transition:all .3s;}
.dot.done{background:#4ade80;border-color:#4ade80;}
.dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--glow);}
.dot.wrong{background:var(--red);border-color:var(--red);}
.score-display{font-family:'Galmuri11',monospace;font-size:.8rem;color:var(--accent);}
.quiz-card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:1.75rem 1.5rem;text-align:center;}
.quiz-question-num{font-family:'Galmuri11',monospace;font-size:.65rem;color:var(--muted);margin-bottom:.75rem;}
.quiz-type-label{display:inline-block;font-family:'Galmuri11',monospace;font-size:.6rem;padding:.15rem .55rem;border-radius:10px;background:rgba(255,203,5,.1);border:1px solid rgba(255,203,5,.25);color:var(--accent);margin-bottom:.75rem;}
.quiz-image-wrap{display:flex;justify-content:center;margin-bottom:1.1rem;}
.quiz-pokemon-img{width:100px;height:100px;image-rendering:pixelated;transition:filter .5s ease;}
.quiz-pokemon-img.hidden{filter:brightness(0) drop-shadow(0 0 16px var(--accent));}
.quiz-question{font-size:.9rem;font-weight:700;color:var(--text);margin-bottom:.4rem;line-height:1.65;}
.quiz-hint{font-size:.75rem;color:var(--muted);margin-bottom:1.35rem;line-height:1.65;padding:.6rem .85rem;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid var(--border);}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:.55rem;}
.option-btn{font-family:'Noto Sans KR',sans-serif;font-size:.8rem;font-weight:700;color:var(--text);background:var(--surface);border:1px solid var(--border);padding:.8rem .85rem;border-radius:12px;cursor:pointer;transition:all .2s;}
.option-btn:hover:not(:disabled){background:rgba(255,203,5,.08);border-color:rgba(255,203,5,.4);color:var(--accent);transform:scale(1.02);}
.option-btn.correct{background:rgba(74,222,128,.15);border-color:#4ade80;color:#4ade80;}
.option-btn.wrong{background:rgba(255,0,0,.1);border-color:var(--red);color:var(--red);}

/* SCROLLBAR */

/* MOBILE */

}

<script>
/* ============================================================
   CONSTANTS
============================================================ */
const TYPE_KO={normal:'노말',fire:'불꽃',water:'물',electric:'전기',grass:'풀',ice:'얼음',fighting:'격투',poison:'독',ground:'땅',flying:'비행',psychic:'에스퍼',bug:'벌레',rock:'바위',ghost:'고스트',dragon:'드래곤',dark:'악',steel:'강철',fairy:'페어리'};
const STAT_KO={hp:'HP',attack:'공격',defense:'방어','special-attack':'특공','special-defense':'특방',speed:'스피드'};
const TYPE_COLOR={normal:'#A8A878',fire:'#F08030',water:'#6890F0',electric:'#F8D030',grass:'#78C850',ice:'#98D8D8',fighting:'#C03028',poison:'#A040A0',ground:'#E0C068',flying:'#A890F0',psychic:'#F85888',bug:'#A8B820',rock:'#B8A038',ghost:'#705898',dragon:'#7038F8',dark:'#705848',steel:'#B8B8D0',fairy:'#EE99AC'};
const GEN_INFO={'generation-i':{name:'1세대',games:['레드·그린','블루','피카츄']},'generation-ii':{name:'2세대',games:['골드·실버','크리스탈']},'generation-iii':{name:'3세대',games:['루비·사파이어','에메랄드','FR·LG']},'generation-iv':{name:'4세대',games:['다이아몬드·펄','플라티나','HG·SS']},'generation-v':{name:'5세대',games:['블랙·화이트','B2·W2']},'generation-vi':{name:'6세대',games:['X·Y','오메가루비·알파사파이어']},'generation-vii':{name:'7세대',games:['썬·문','울트라썬·울트라문','렛츠고']},'generation-viii':{name:'8세대',games:['소드·실드','브릴다이아·샤이닝펄','레전드 아르세우스']},'generation-ix':{name:'9세대',games:['스칼렛·바이올렛']}};
const VERSION_GEN={'red':'1세대','blue':'1세대','yellow':'1세대','gold':'2세대','silver':'2세대','crystal':'2세대','ruby':'3세대','sapphire':'3세대','emerald':'3세대','firered':'3세대','leafgreen':'3세대','diamond':'4세대','pearl':'4세대','platinum':'4세대','heartgold':'4세대','soulsilver':'4세대','black':'5세대','white':'5세대','black-2':'5세대','white-2':'5세대','x':'6세대','y':'6세대','omega-ruby':'6세대','alpha-sapphire':'6세대','sun':'7세대','moon':'7세대','ultra-sun':'7세대','ultra-moon':'7세대','lets-go-pikachu':'7세대','lets-go-eevee':'7세대','sword':'8세대','shield':'8세대','brilliant-diamond':'8세대','shining-pearl':'8세대','legends-arceus':'8세대','scarlet':'9세대','violet':'9세대'};

// 리전폼 한국어 접미사
const FORM_SUFFIX_KO={'alola':'알로라 폼','galar':'가라르 폼','hisui':'히스이 폼','paldea':'팔데아 폼','mega':'메가 진화','mega-x':'메가 진화 X','mega-y':'메가 진화 Y','gmax':'거다이맥스','alolan':'알로라 폼','galarian':'가라르 폼','hisuian':'히스이 폼','paldean':'팔데아 폼','origin':'오리진 폼','sky':'스카이 폼','therian':'영물 폼','black':'블랙','white':'화이트','resolute':'각오 폼','ordinary':'통상 폼','pirouette':'피루에트 폼'};

function getFormLabel(formName, baseName) {
  if (!formName || formName === baseName) return '';
  const suffix = formName.replace(baseName+'-','');
  for (const [key, label] of Object.entries(FORM_SUFFIX_KO)) {
    if (suffix.includes(key)) return label;
  }
  if (suffix) return suffix.replace(/-/g,' ');
  return '';
}

function evoMethodKo(d) {
  if (!d) return '';
  const parts = [];
  if (d.min_level) parts.push(`Lv.${d.min_level}`);
  if (d.time_of_day==='day') parts.push('낮');
  if (d.time_of_day==='night') parts.push('밤');
  if (d.min_happiness) parts.push('친밀도↑');
  if (d.min_beauty) parts.push('아름다움↑');
  if (d.min_affection) parts.push('친애도↑');
  if (d.item) parts.push(d.item.name);
  if (d.held_item) parts.push('소지:'+d.held_item.name);
  if (d.known_move) parts.push('기술습득');
  if (d.known_move_type) parts.push('타입기술');
  if (d.location) parts.push('특정장소');
  if (d.needs_overworld_rain) parts.push('비 속');
  if (d.trade_species||d.trigger?.name==='trade') parts.push('통신교환');
  if (!parts.length && d.trigger?.name==='use-item') parts.push('아이템사용');
  if (!parts.length) parts.push('레벨업');
  return parts.join(' ');
}

/* ============================================================
   SEEDED RNG & DAILY IDS
============================================================ */
function seededRand(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}
function getDailySeed(){const d=new Date();return d.getFullYear()*10000+(d.getMonth()+1)*100+d.getDate();}
const MAX_ID=1025;
function pickDailyIds(){
  const rand=seededRand(getDailySeed());
  const ids=new Set();
  while(ids.size<3) ids.add(Math.floor(rand()*MAX_ID)+1);
  return [...ids].sort((a,b)=>a-b);
}

/* ============================================================
   FETCH POKEMON (full detail)
============================================================ */
async function fetchPokemon(id, _depth=0) {
  if(_depth>5) return null;
  let poke, spec;
  try {
    [poke,spec]=await Promise.all([
      fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>{if(!r.ok)throw new Error();return r.json();}),
      fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`).then(r=>{if(!r.ok)throw new Error();return r.json();})
    ]);
  } catch(e) {
    return fetchPokemon(Math.floor(Math.random()*898)+1,_depth+1);
  }

  const nameKo = spec.names.find(n=>n.language.name==='ko')?.name
               || spec.names.find(n=>n.language.name==='ja-Hrkt')?.name
               || poke.name;

  // 한국어 설명 — 모든 항목 중 ko 우선
  const allDescs = spec.flavor_text_entries;
  const koDesc = allDescs.find(e=>e.language.name==='ko')?.flavor_text;
  const enDesc = allDescs.find(e=>e.language.name==='en')?.flavor_text;
  const desc = (koDesc||enDesc||'').replace(/\f/g,' ').replace(/\n/g,' ');

  // 특성 한국어
  const abilities = await Promise.all(poke.abilities.map(async a=>{
    let nameA=a.ability.name;
    try{
      const ab=await fetch(a.ability.url).then(r=>r.json());
      nameA=ab.names.find(n=>n.language.name==='ko')?.name
           ||ab.names.find(n=>n.language.name==='ja')?.name
           ||a.ability.name;
    }catch(e){}
    return{name:nameA,isHidden:a.is_hidden};
  }));

  // 등장 게임
  const gameVersions=[...new Set(spec.flavor_text_entries.map(e=>e.version?.name).filter(Boolean))];

  // 다른 폼 목록
  const forms = spec.varieties?.map(v=>({name:v.pokemon.name,url:v.pokemon.url,isDefault:v.is_default}))||[];

  return {
    id, name:nameKo, nameEn:poke.name,
    image:poke.sprites.other['official-artwork']?.front_default||poke.sprites.front_default,
    imagePixel:poke.sprites.front_default,
    types:poke.types.map(t=>t.type.name),
    stats:poke.stats.slice(0,6).map(s=>({name:s.stat.name,value:s.base_stat})),
    desc, category:spec.genera.find(g=>g.language.name==='ko')?.genus||'',
    height:poke.height/10, weight:poke.weight/10,
    genus:spec.genera.find(g=>g.language.name==='ko')?.genus||'',
    generation:spec.generation?.name||'',
    evoChainUrl:spec.evolution_chain?.url||'',
    abilities, gameVersions, forms,
    captureRate:spec.capture_rate,
    speciesId:spec.id,
  };
}

/* light fetch for national dex grid (no species needed initially) */
async function fetchPokemonLight(id) {
  try {
    const poke=await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`).then(r=>{if(!r.ok)throw 0;return r.json();});
    return {
      id, nameEn:poke.name,
      image:poke.sprites.other['official-artwork']?.front_default||poke.sprites.front_default,
      types:poke.types.map(t=>t.type.name),
    };
  } catch(e){return null;}
}

/* ============================================================
   EVOLUTION CHAIN
============================================================ */
async function fetchEvoChain(url){try{return(await fetch(url).then(r=>r.json())).chain;}catch(e){return null;}}
async function parseEvoChain(chain){
  const steps=[];
  async function walk(node){
    const sid=parseInt(node.species.url.split('/').filter(Boolean).pop());
    let img=null,nameKo=node.species.name;
    try{
      const[pk,sp]=await Promise.all([
        fetch(`https://pokeapi.co/api/v2/pokemon/${sid}`).then(r=>r.json()),
        fetch(`https://pokeapi.co/api/v2/pokemon-species/${sid}`).then(r=>r.json()),
      ]);
      img=pk.sprites.other['official-artwork']?.front_default||pk.sprites.front_default;
      nameKo=sp.names.find(n=>n.language.name==='ko')?.name||node.species.name;
    }catch(e){}
    const methods=node.evolution_details?.map(d=>evoMethodKo(d)).filter(Boolean)||[];
    steps.push({id:sid,name:nameKo,img,methods});
    for(const evo of(node.evolves_to||[])) await walk(evo);
  }
  await walk(chain);
  return steps;
}

/* ============================================================
   STATE
============================================================ */
let pokemonData=[];
let dexViewed=false;
let quizQuestions=[],quizIdx=0,quizScore=0,quizAnswered=[];

// National dex state
let ndexCache={};      // id -> light data
let ndexNameCache={};  // id -> ko name
let ndexAllIds=[];     // 1..1025
let ndexFiltered=[];   // filtered ids
let ndexShown=0;
const NDEX_PAGE=60;
let ndexLoading=false;
let activeTypeFilter=null;
let searchQuery='';

/* ============================================================
   INIT
============================================================ */
const dateEl=document.getElementById('dateDisplay');
const d0=new Date();
dateEl.textContent=`${d0.getFullYear()}.${String(d0.getMonth()+1).padStart(2,'0')}.${String(d0.getDate()).padStart(2,'0')}`;

async function init(){
  const ids=pickDailyIds();
  const results=await Promise.all(ids.map(fetchPokemon));
  pokemonData=results.filter(Boolean);
  renderDex();
}

/* ============================================================
   DAILY DEX
============================================================ */
function renderDex(){
  document.getElementById('dex-loading').style.display='none';
  document.getElementById('dex-content').style.display='block';
  const grid=document.getElementById('pokemonGrid');
  grid.innerHTML='';
  pokemonData.forEach((p,i)=>{
    const color=TYPE_COLOR[p.types[0]]||'#ffcb05';
    const card=document.createElement('div');
    card.className='pokemon-card';
    card.style.setProperty('--card-color',color);
    card.style.setProperty('--card-glow',color+'44');
    card.onclick=()=>openModal(p);
    card.innerHTML=`
      <div class="card-bg"></div>
      <span class="card-hint">탭하면 자세히 ▶</span>
      <div class="card-number">No.${String(p.id).padStart(4,'0')} · ${p.genus}</div>
      <div class="card-image-wrap"><img class="card-image" src="${p.image}" alt="${p.name}" loading="lazy"/></div>
      <div class="card-name">${p.name}</div>
      <div class="type-badges">${p.types.map(t=>`<span class="type-badge type-${t}">${TYPE_KO[t]||t}</span>`).join('')}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-stats">${p.stats.map(s=>`
        <div class="stat-row">
          <span class="stat-label">${STAT_KO[s.name]||s.name}</span>
          <div class="stat-bar-wrap"><div class="stat-bar" style="width:0%" data-val="${Math.min(s.value,255)/255*100}"></div></div>
          <span class="stat-value">${s.value}</span>
        </div>`).join('')}
      </div>
      <div class="card-meta"><span>키 ${p.height}m</span><span>무게 ${p.weight}kg</span></div>`;
    grid.appendChild(card);
    setTimeout(()=>{card.querySelectorAll('.stat-bar').forEach(b=>{b.style.width=b.dataset.val+'%';});},500+i*100);
  });
  dexViewed=true;
}

/* ============================================================
   NATIONAL DEX
============================================================ */
function initNdex(){
  if(ndexAllIds.length) return; // already init
  ndexAllIds=Array.from({length:MAX_ID},(_,i)=>i+1);
  ndexFiltered=[...ndexAllIds];
  buildTypeFilterUI();
  renderNdexPage();
}

function buildTypeFilterUI(){
  const wrap=document.getElementById('typeFilter');
  wrap.innerHTML='';
  Object.entries(TYPE_KO).forEach(([en,ko])=>{
    const btn=document.createElement('button');
    btn.className='type-filter-btn type-'+en;
    btn.textContent=ko;
    btn.onclick=()=>toggleTypeFilter(en,btn);
    wrap.appendChild(btn);
  });
}

function toggleTypeFilter(type,btn){
  if(activeTypeFilter===type){
    activeTypeFilter=null;
    document.querySelectorAll('.type-filter-btn').forEach(b=>b.classList.remove('active'));
  } else {
    activeTypeFilter=type;
    document.querySelectorAll('.type-filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  applyNdexFilter();
}

function onSearch(){
  searchQuery=document.getElementById('ndexSearch').value.trim().toLowerCase();
  applyNdexFilter();
}

function applyNdexFilter(){
  if(!searchQuery && !activeTypeFilter){
    ndexFiltered=[...ndexAllIds];
    ndexShown=0;
    document.getElementById('ndexGrid').innerHTML='';
    document.getElementById('ndexCount').textContent=`${MAX_ID} / ${MAX_ID}`;
    document.getElementById('loadMoreWrap').style.display='none';
    renderNdexPage();
    return;
  }

  // filter by cache
  const byQuery=[];
  const byType=[];
  const needQuery=searchQuery.length>0;
  const needType=!!activeTypeFilter;

  ndexAllIds.forEach(id=>{
    const light=ndexCache[id];
    const ko=ndexNameCache[id]||'';
    const en=light?.nameEn||'';
    const matchQ=!needQuery||(ko.includes(searchQuery)||en.includes(searchQuery)||String(id).includes(searchQuery));
    const matchT=!needType||(light?.types||[]).includes(activeTypeFilter);
    if(matchQ&&matchT){
      if(light) byQuery.push(id);
      else byType.push(id); // not cached yet, include tentatively for type-only filter
    }
  });

  // If type filter active but no query, show all (cached or not, filter at render time)
  if(needType&&!needQuery){
    ndexFiltered=ndexAllIds; // will re-filter at render
  } else {
    ndexFiltered=[...new Set([...byQuery,...byType])].sort((a,b)=>a-b);
  }
  ndexShown=0;
  document.getElementById('ndexGrid').innerHTML='';
  renderNdexPage();
}

async function renderNdexPage(){
  if(ndexLoading) return;
  ndexLoading=true;

  const grid=document.getElementById('ndexGrid');
  const ids=ndexFiltered.slice(ndexShown,ndexShown+NDEX_PAGE);
  if(!ids.length){ndexLoading=false;updateNdexCount();return;}

  // show spinner
  let spinner=document.getElementById('ndexSpinner');
  if(!spinner){spinner=document.createElement('div');spinner.id='ndexSpinner';spinner.className='ndex-spinner';spinner.textContent='불러오는 중...';document.getElementById('ndexGridWrap').appendChild(spinner);}

  const batch=await Promise.all(ids.map(async id=>{
    if(ndexCache[id]) return ndexCache[id];
    const data=await fetchPokemonLight(id);
    if(data){ndexCache[id]=data;}
    return data;
  }));

  spinner.remove();

  batch.forEach((p,i)=>{
    if(!p) return;
    const id=ids[i];
    // apply type filter
    if(activeTypeFilter&&!p.types.includes(activeTypeFilter)) return;
    // apply search
    const ko=ndexNameCache[id]||'';
    if(searchQuery&&!(ko.includes(searchQuery)||p.nameEn.includes(searchQuery)||String(id).includes(searchQuery))) return;

    const color=TYPE_COLOR[p.types[0]]||'#ffcb05';
    const card=document.createElement('div');
    card.className='ndex-card';
    card.style.setProperty('--nc',color);
    card.onclick=()=>openModalById(id);
    card.innerHTML=`
      <img class="ndex-img" src="${p.image||''}" alt="" loading="lazy"/>
      <div class="ndex-num">No.${String(id).padStart(4,'0')}</div>
      <div class="ndex-name" id="ndex-name-${id}">${ko||p.nameEn}</div>
      <div class="ndex-type-dots">${p.types.map(t=>`<div class="ndex-type-dot" style="background:${TYPE_COLOR[t]||'#888'}" title="${TYPE_KO[t]||t}"></div>`).join('')}</div>`;
    grid.appendChild(card);

    // async load Korean name if missing
    if(!ndexNameCache[id]){
      fetch(`https://pokeapi.co/api/v2/pokemon-species/${id}`)
        .then(r=>r.json())
        .then(sp=>{
          const ko=sp.names.find(n=>n.language.name==='ko')?.name||sp.names.find(n=>n.language.name==='ja-Hrkt')?.name||p.nameEn;
          ndexNameCache[id]=ko;
          const el=document.getElementById(`ndex-name-${id}`);
          if(el) el.textContent=ko;
        }).catch(()=>{});
    }
  });

  ndexShown+=NDEX_PAGE;
  ndexLoading=false;
  updateNdexCount();

  const hasMore=ndexShown<ndexFiltered.length;
  document.getElementById('loadMoreWrap').style.display=hasMore?'flex':'none';
}

function updateNdexCount(){
  const showing=document.getElementById('ndexGrid').children.length;
  document.getElementById('ndexCount').textContent=`${showing} / ${MAX_ID}`;
}

function loadMoreNdex(){renderNdexPage();}

async function openModalById(id){
  const cached=await fetchPokemon(id);
  if(cached) openModal(cached);
}

/* ============================================================
   MODAL
============================================================ */
async function openModal(p){
  const color=TYPE_COLOR[p.types[0]]||'#ffcb05';
  const overlay=document.getElementById('modalOverlay');
  document.getElementById('modal').style.setProperty('--modal-color',color);

  const genInfo=GEN_INFO[p.generation]||{name:'알 수 없음',games:[]};
  const genMap={};
  p.gameVersions.forEach(v=>{const g=VERSION_GEN[v];if(g){if(!genMap[g])genMap[g]=true;}});

  // 폼 배지
  const hasMultipleForms=p.forms&&p.forms.length>1;
  const formLabel=getFormLabel(p.nameEn,p.forms?.find(f=>f.isDefault)?.name||p.nameEn);

  document.getElementById('modalContent').innerHTML=`
    <div class="modal-header">
      <div class="modal-header-bg"></div>
      <div class="modal-header-inner">
        <div class="modal-image-wrap">
          <img class="modal-image" id="modalMainImg" src="${p.image}" alt="${p.name}"/>
        </div>
        <div class="modal-title-block">
          <div class="modal-number">No.${String(p.id).padStart(4,'0')} · ${p.genus}</div>
          <div class="modal-name">${p.name}${formLabel?`<span class="form-badge">${formLabel}</span>`:''}</div>
          <div class="modal-name-en">${p.nameEn}</div>
          <div class="modal-types">${p.types.map(t=>`<span class="type-badge type-${t}">${TYPE_KO[t]||t}</span>`).join('')}</div>
        </div>
      </div>
    </div>
    <div class="modal-body">

      ${hasMultipleForms?`
      <div class="modal-section">
        <div class="modal-section-title">🌀 다른 폼</div>
        <div class="forms-grid" id="formsGrid">
          <div style="font-family:'Galmuri11',monospace;font-size:.7rem;color:var(--muted);animation:blink 1.2s step-end infinite">폼 정보 로딩 중...</div>
        </div>
      </div>`:''}

      <div class="modal-section">
        <div class="modal-section-title">📖 도감 설명</div>
        <div class="modal-desc">${p.desc||'설명 없음'}</div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">📊 기본 스탯</div>
        <div class="modal-stats">${p.stats.map(s=>`
          <div class="modal-stat-row">
            <div class="modal-stat-top">
              <span class="modal-stat-label">${STAT_KO[s.name]||s.name}</span>
              <span class="modal-stat-val">${s.value}</span>
            </div>
            <div class="modal-stat-bar-wrap"><div class="modal-stat-bar" style="width:0%" data-val="${Math.min(s.value,255)/255*100}"></div></div>
          </div>`).join('')}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">📏 기본 정보</div>
        <div class="modal-info-grid">
          <div class="modal-info-item"><div class="modal-info-label">키</div><div class="modal-info-val">${p.height}m</div></div>
          <div class="modal-info-item"><div class="modal-info-label">무게</div><div class="modal-info-val">${p.weight}kg</div></div>
          <div class="modal-info-item"><div class="modal-info-label">포획률</div><div class="modal-info-val">${p.captureRate??'-'}</div></div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">✨ 특성</div>
        <div class="ability-list">${p.abilities.map(a=>`
          <span class="ability-tag ${a.isHidden?'hidden-ability':''}">
            ${a.name}${a.isHidden?'<span class="hidden-label">숨겨진특성</span>':''}
          </span>`).join('')}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">🌍 등장 세대</div>
        <div class="modal-gen-block">
          <div class="modal-gen-row">
            <span class="modal-gen-label">첫 등장</span>
            <span class="modal-gen-val">${genInfo.name}</span>
          </div>
          <div class="modal-gen-row">
            <span class="modal-gen-label">대표 타이틀</span>
            <span class="modal-gen-val" style="font-size:.7rem">${genInfo.games.join(' · ')||'-'}</span>
          </div>
          ${Object.keys(genMap).filter(g=>g!==genInfo.name).length>0?`
          <div class="modal-gen-row" style="align-items:flex-start">
            <span class="modal-gen-label" style="padding-top:.15rem">이후 등장</span>
            <div class="modal-game-tags">${Object.keys(genMap).filter(g=>g!==genInfo.name).sort().map(g=>`<span class="modal-game-tag">${g}</span>`).join('')}</div>
          </div>`:''}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">🔄 진화 과정</div>
        <div id="evoChainArea"><div class="evo-loading">진화 정보 불러오는 중...</div></div>
      </div>

    </div>`;

  overlay.classList.add('open');
  document.body.style.overflow='hidden';

  setTimeout(()=>{document.querySelectorAll('.modal-stat-bar').forEach(b=>{b.style.width=b.dataset.val+'%';});},100);

  // 폼 로드
  if(hasMultipleForms) loadForms(p);

  // 진화 체인
  if(p.evoChainUrl){
    const chain=await fetchEvoChain(p.evoChainUrl);
    if(chain){const steps=await parseEvoChain(chain);renderEvoChain(steps,p.id);}
    else document.getElementById('evoChainArea').innerHTML='<div style="color:var(--muted);font-size:.75rem;text-align:center;padding:1rem">단일 진화 (진화 없음)</div>';
  } else {
    document.getElementById('evoChainArea').innerHTML='<div style="color:var(--muted);font-size:.75rem;text-align:center;padding:1rem">진화 정보 없음</div>';
  }
}

async function loadForms(p){
  const grid=document.getElementById('formsGrid');
  if(!grid) return;
  const results=await Promise.all(p.forms.map(async f=>{
    try{
      const pk=await fetch(f.url).then(r=>r.json());
      const img=pk.sprites.other['official-artwork']?.front_default||pk.sprites.front_default;
      const label=getFormLabel(f.name,p.forms.find(x=>x.isDefault)?.name||p.nameEn)||'기본 폼';
      return{name:f.name,label,img,isDefault:f.isDefault,types:pk.types.map(t=>t.type.name)};
    }catch(e){return null;}
  }));
  grid.innerHTML='';
  results.filter(Boolean).forEach(f=>{
    const card=document.createElement('div');
    card.className='form-card'+(f.isDefault?' active-form':'');
    card.innerHTML=`<img src="${f.img||''}" alt="${f.label}"/><div class="form-card-name">${f.label}</div>`;
    card.onclick=()=>{
      if(f.img) document.getElementById('modalMainImg').src=f.img;
      grid.querySelectorAll('.form-card').forEach(c=>c.classList.remove('active-form'));
      card.classList.add('active-form');
    };
    grid.appendChild(card);
  });
}

function renderEvoChain(steps,currentId){
  const area=document.getElementById('evoChainArea');
  if(!area) return;
  if(steps.length<=1){area.innerHTML='<div style="color:var(--muted);font-size:.75rem;text-align:center;padding:1rem">단일 진화 (진화 없음)</div>';return;}
  let html='<div class="evo-chain">';
  steps.forEach((s,i)=>{
    if(i>0) html+=`<div class="evo-arrow"><span>→</span><span class="evo-method">${s.methods?.[0]||''}</span></div>`;
    html+=`<div class="evo-step${s.id===currentId?' current':''}">
      <div class="evo-img-wrap">${s.img?`<img class="evo-img" src="${s.img}" loading="lazy"/>`:'<div style="width:42px;height:42px;"></div>'}</div>
      <div class="evo-name">${s.name}</div>
      <div class="evo-num">No.${String(s.id).padStart(4,'0')}</div>
    </div>`;
  });
  html+='</div>';
  area.innerHTML=html;
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
function closeModalOnBg(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

/* ============================================================
   QUIZ  (9 question types)
============================================================ */
function buildQuiz(){
  quizQuestions=[];quizIdx=0;quizScore=0;quizAnswered=[];
  const allNames=pokemonData.map(p=>p.name);
  const extras=['이상해씨','리자몽','거북왕','피카츄','파이리','꼬부기','잠만보','뮤츠','마자용','한카리아스','루카리오','가브리아스','레쿠쟈','다크라이','아르세우스','조로아크','게노세크트','제르네아스','이벨타르','지가르데','솔가레오','루나아라','네크로즈마','마기아나','마샤도','천지용사','수레기','챠오레무','에테루스','뮤'];
  const pool=extras.filter(n=>!allNames.includes(n));

  pokemonData.forEach((p,i)=>{
    const others=pokemonData.filter((_,j)=>j!==i);
    const otherNames=others.map(o=>o.name);
    const fillNames=shuffle([...pool]).slice(0,Math.max(0,3-otherNames.length));
    const namePool=shuffle([...otherNames,...fillNames]);

    // Q1: 실루엣 → 이름 맞히기
    quizQuestions.push({type:'silhouette',pokemon:p,question:'이 포켓몬의 이름은?',hint:`힌트: ${p.desc.slice(0,55)}…`,answer:p.name,options:shuffle([p.name,namePool[0],namePool[1],namePool[2]])});

    // Q2: 타입 맞히기
    const wrongTypes=shuffle(Object.keys(TYPE_KO).filter(t=>!p.types.includes(t))).slice(0,3);
    quizQuestions.push({type:'type',pokemon:p,question:`${p.name}의 주요 타입은?`,hint:`${p.genus} 포켓몬이에요.`,answer:TYPE_KO[p.types[0]],options:shuffle([TYPE_KO[p.types[0]],...wrongTypes.map(t=>TYPE_KO[t])])});

    // Q3: 세대 맞히기
    const genInfo=GEN_INFO[p.generation]||{name:'알 수 없음'};
    const wrongGens=shuffle(Object.values(GEN_INFO).map(g=>g.name).filter(g=>g!==genInfo.name)).slice(0,3);
    if(wrongGens.length>=3){
      quizQuestions.push({type:'gen',pokemon:p,question:`${p.name}가 처음 등장한 세대는?`,hint:`타입: ${p.types.map(t=>TYPE_KO[t]).join(' / ')}`,answer:genInfo.name,options:shuffle([genInfo.name,...wrongGens])});
    }

    // Q4: 키 맞히기
    const hOpts=[p.height];
    while(hOpts.length<4){const v=+(Math.random()*3+0.1).toFixed(1);if(!hOpts.includes(v))hOpts.push(v);}
    quizQuestions.push({type:'height',pokemon:p,question:`${p.name}의 키는?`,hint:`${p.genus} 포켓몬이에요.`,answer:`${p.height}m`,options:shuffle(hOpts.map(v=>`${v}m`))});

    // Q5: 설명으로 이름 맞히기 (다른 포켓몬 설명을 보여줌)
    quizQuestions.push({type:'desc',pokemon:p,question:'이 도감 설명은 어떤 포켓몬일까요?',hint:p.desc.slice(0,80)+'…',answer:p.name,options:shuffle([p.name,namePool[0],namePool[1],namePool[2]])});
  });

  // 전체 섞어서 최대 10문제
  quizQuestions=shuffle(quizQuestions).slice(0,10);
  renderQuiz();
}

function renderQuiz(){
  document.getElementById('quiz-wait').style.display='none';
  document.getElementById('quiz-content').style.display='block';
  renderProgressDots();renderQuestion();
}
function renderProgressDots(){
  document.getElementById('progressDots').innerHTML=quizQuestions.map((_,i)=>{
    let c='dot';
    if(i<quizIdx) c+=quizAnswered[i]?' done':' wrong';
    else if(i===quizIdx) c+=' active';
    return `<div class="${c}"></div>`;
  }).join('');
  document.getElementById('scoreDisplay').textContent=`${quizScore} / ${quizIdx}`;
}
function renderQuestion(){
  const area=document.getElementById('quizArea');
  if(quizIdx>=quizQuestions.length){renderResult();return;}
  const q=quizQuestions[quizIdx];
  const typeLabels={silhouette:'👻 실루엣',type:'🎨 타입',gen:'🌍 세대',height:'📏 키',desc:'📖 설명'};
  const hidden=q.type==='silhouette';
  area.innerHTML=`
    <div class="quiz-card">
      <div class="quiz-question-num">Q${quizIdx+1} / ${quizQuestions.length}</div>
      <div class="quiz-type-label">${typeLabels[q.type]||'퀴즈'}</div>
      <div class="quiz-image-wrap">
        <img id="quizImg" class="quiz-pokemon-img${hidden?' hidden':''}" src="${q.pokemon.image}" alt="?"/>
      </div>
      <div class="quiz-question">${q.question}</div>
      <div class="quiz-hint">${q.hint}</div>
      <div class="options-grid">${q.options.map(opt=>`<button class="option-btn" onclick="answerQuiz(${JSON.stringify(opt)},this)">${opt}</button>`).join('')}</div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">${quizIdx<quizQuestions.length-1?'다음 문제 →':'결과 보기 →'}</button>
    </div>`;
  renderProgressDots();
}
function answerQuiz(chosen,btn){
  const q=quizQuestions[quizIdx];
  document.querySelectorAll('.option-btn').forEach(b=>b.disabled=true);
  const correct=chosen===q.answer;
  const fb=document.getElementById('quizFeedback');
  const img=document.getElementById('quizImg');
  if(img) img.classList.remove('hidden');
  if(correct){btn.classList.add('correct');quizScore++;fb.className='quiz-feedback show correct-fb';fb.textContent=`✅ 정답! ${q.pokemon.name} 맞아요!`;quizAnswered.push(true);}
  else{btn.classList.add('wrong');document.querySelectorAll('.option-btn').forEach(b=>{if(b.textContent.trim()===q.answer)b.classList.add('correct');});fb.className='quiz-feedback show wrong-fb';fb.textContent=`❌ 오답! 정답은 "${q.answer}"이에요.`;quizAnswered.push(false);}
  document.getElementById('nextBtn').classList.add('show');
  renderProgressDots();
}
function nextQuestion(){quizIdx++;renderQuestion();}
function renderResult(){
  const area=document.getElementById('quizArea');
  const pct=Math.round(quizScore/quizQuestions.length*100);
  const emoji=pct===100?'🏆':pct>=70?'⭐':pct>=40?'💪':'😅';
  const msg=pct===100?'완벽해요! 포켓몬 마스터네요!':pct>=70?'훌륭해요! 오늘도 잘 했어요!':pct>=40?'나쁘지 않아요! 다시 도전해봐요.':'오늘의 포켓몬을 다시 공부해봐요!';
  area.innerHTML=`<div class="result-card">
    <span class="result-emoji">${emoji}</span>
    <div class="result-score">${quizScore}/${quizQuestions.length}</div>
    <div class="result-msg">${msg}</div>
    <div class="result-breakdown">${quizQuestions.map((q,i)=>`
      <div class="breakdown-row">
        <span class="breakdown-name">${q.pokemon.name} · ${({silhouette:'실루엣',type:'타입',gen:'세대',height:'키',desc:'설명'})[q.type]||'퀴즈'}</span>
        <span class="breakdown-result ${quizAnswered[i]?'ok':'bad'}">${quizAnswered[i]?'정답✓':'오답✗'}</span>
      </div>`).join('')}
    </div>
    <button class="restart-btn" onclick="restartQuiz()">🔄 다시 풀기</button>
  </div>`;
  renderProgressDots();
}
function restartQuiz(){buildQuiz();}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* ============================================================
   TABS
============================================================ */
function showTab(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{b.classList.toggle('active',['dex','ndex','quiz'][i]===tab);});
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab+'-page').classList.add('active');
  if(tab==='ndex') initNdex();
  if(tab==='quiz'){
    if(!dexViewed){document.getElementById('quiz-wait').style.display='flex';document.getElementById('quiz-content').style.display='none';}
    else if(!quizQuestions.length) buildQuiz();
  }
}

init();
